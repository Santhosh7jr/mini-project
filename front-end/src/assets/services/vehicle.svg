<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define sharp-edged geometric background facets in Light Blues -->
  <defs>
    <linearGradient id="facetGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sharp-edged geometric background shapes (Light Blue) -->
  <path d="M0 0 H200 V200 H0 Z" fill="#F0F8FF"/>
  <path d="M0 40 L60 0 H140 L200 40 V160 L140 200 H60 L0 160 Z" fill="#E1F5FE"/>
  <path d="M20 60 L100 20 L180 60 L180 140 L100 180 L20 140 Z" fill="#BBDEFB" stroke="#90CAF9" stroke-width="2"/>

  <!-- Modern Car Vector Figure -->
  <g transform="translate(30, 45)">
    <!-- Main Car Body -->
    <path d="M10 90 L30 60 H110 L130 90 V110 H10 Z" fill="#2196F3"/> <!-- Upper Body -->
    <path d="M10 110 H130 L125 125 H15 V110 Z" fill="#1976D2"/> <!-- Lower Body -->
    
    <!-- Windshield and Windows -->
    <path d="M35 65 L45 70 H95 L105 65 Z" fill="#0D47A1"/> <!-- Front Windshield -->
    <path d="M48 73 H72 L70 85 H50 Z" fill="#0D47A1"/> <!-- Driver Window -->
    <path d="M78 73 H98 L96 85 H76 Z" fill="#0D47A1"/> <!-- Passenger Window -->
    <path d="M105 68 L115 72 L110 85 H100 L105 68 Z" fill="#0D47A1"/> <!-- Rear Window -->

    <!-- Wheels -->
    <circle cx="35" cy="120" r="20" fill="#424242"/> <!-- Front Wheel Tire -->
    <circle cx="35" cy="120" r="14" fill="#757575" stroke="#E0E0E0" stroke-width="1.5"/> <!-- Front Rim -->
    <circle cx="105" cy="120" r="20" fill="#424242"/> <!-- Rear Wheel Tire -->
    <circle cx="105" cy="120" r="14" fill="#757575" stroke="#E0E0E0" stroke-width="1.5"/> <!-- Rear Rim -->

    <!-- Headlights/Taillights/Grill -->
    <ellipse cx="20" cy="100" rx="6" ry="3" fill="#FFEB3B"/> <!-- Headlight -->
    <ellipse cx="120" cy="100" rx="6" ry="3" fill="#F44336"/> <!-- Taillight -->
    <rect x="25" y="103" width="90" height="10" rx="2" fill="#E0E0E0"/> <!-- Upper Grill -->
    <rect x="30" y="105" width="80" height="6" rx="1.5" fill="#424242"/> <!-- Inner Grill Detail -->
    <rect x="15" y="108" width="10" height="5" rx="1" fill="#FF9800"/> <!-- Front Turn Signal -->

    <!-- Bumpers and Underbody -->
    <rect x="10" y="125" width="120" height="7" rx="2" fill="#424242"/>
    <path d="M20 132 H120 V138 H20 Z" fill="#333333"/>
    
    <!-- Mirror -->
    <path d="M100 85 L105 80 L108 85 H100" fill="#E0E0E0" stroke="#424242" stroke-width="1"/>
    
    <!-- Door Handles -->
    <rect x="55" y="93" width="15" height="4" rx="1.5" fill="#E0E0E0"/>
    <rect x="85" y="93" width="15" height="4" rx="1.5" fill="#E0E0E0"/>
    
    <!-- Ground Shadow -->
    <ellipse cx="70" cy="142" rx="65" ry="6" fill="#D2EBFB" opacity="0.6"/>
  </g>
</svg>
